kind = "web"
previewPath = "/"
title = "E-Cell IIST Recruitment 2026–27"
version = "1.0.0"
id = "artifacts/ecell-recruitment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20105

[services.development]
run = "pnpm --filter @workspace/ecell-recruitment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecell-recruitment", "run", "build" ]
publicDir = "artifacts/ecell-recruitment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20105"
BASE_PATH = "/"
